site_name: makeshift
site_description: Lightweight, dependency-light Python tools for protein NMR data
site_url: https://makeshift.readthedocs.io/
repo_url: https://github.com/WaymentSteeleLab/makeshift
repo_name: WaymentSteeleLab/makeshift
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Quickstart: quickstart.md
      - NMR-STAR concepts: concepts.md
  - User guide:
      - Reading BMRB entries: guide/entries.md
      - Chemical shifts: guide/chemical-shifts.md
      - Re-referencing: guide/rereferencing.md
      - Peak lists: guide/peaklists.md
      - Spectra: guide/spectra.md
      - Relaxation & dynamics: guide/relaxation.md
      - CPMG dispersion: guide/cpmg.md
      - HYDRONMR prediction: guide/hydronmr.md
      - TALOS-N prediction: guide/talosn.md
      - Datasets & structures: guide/datasets.md
  - API reference:
      - Overview: api/index.md
      - NMRStarEntry: api/entry.md
      - ChemicalShifts: api/chemshift.md
      - PeakList: api/peaklist.md
      - Spectra: api/spectra.md
      - Re-referencing: api/reref.md
      - Relaxation: api/relaxation.md
      - CPMG: api/cpmg.md
      - HYDRONMR: api/hydronmr.md
      - TALOS-N: api/talosn.md
      - Utilities: api/utils.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters:
              - "!^_"
            docstring_section_style: table

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

watch:
  - makeshift