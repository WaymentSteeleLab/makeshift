# Default Fast-HYDRONMR run configuration.

# The only thing that varies per run is the input PDB structure
# (passed separately to hydronmr.run(pdb_path, ...))

temperature_k: 293.0        # T (temperature, K)
viscosity_poise: 0.01       # ETA (solvent viscosity, poise)
aer_angstrom: 3.0            # AER, radius of the atomic elements
ind: 1                       # type of hydrodynamic interaction (1 or 3);
                              # see SHELL_MODEL_NOTES.md -- ground truth
                              # uses ind=3 with the (not-yet-ported) shell
                              # model; ind=1 on the raw AER model is the
                              # current validated approximation (task #4).
nsig: -1                      # -1 = auto-estimate shell sigma bounds (task #4, not yet used)

# NMR / dipole parameters (dipolesnmr_)
iflag_dipoles: 1               # 1 = no explicit H in PDB, 2 = explicit H
gamma_x_e7: -2.7126            # gyromagnetic ratio of X nucleus, 1e7 rad s^-1 T^-1
r_nh_angstrom: 1.02            # N-H bond length, Angstrom
csa_ppm: -172.0                # chemical shift anisotropy, ppm
fields_tesla: [11.74]          # magnetic field strength(s), Tesla
